<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">

	<!--
		Use a content security policy to only allow loading images from https or from our extension directory,
		and only allow scripts that have a specific nonce.
	-->
	<meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src ${webview.cspSource}; img-src ${webview.cspSource} https:; script-src 'nonce-${nonce}';">

	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link href="${styleResetUri}" type="text/css" rel="stylesheet">
	<link href="${styleUri}" rel="stylesheet">

	<title>Thread Graph</title>
</head>
<body>
	<div id="main-bar">
		<button id="external-button" ${externalCode}>Show external code</button>
	</div>
	<div id="canvas-container">
		<canvas id="thread-canvas"></canvas>
		<span id="canvas-info">No debug session is currently active.</span>
	</div>

	<script nonce="${nonce}" src="${scriptUri}"></script>
</body>
</html>
