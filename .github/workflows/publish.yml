name: Publish extension on tag

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Build (compile)
        run: npm run compile

      - name: Package VSIX
        run: |
          npx -y vsce package

      - name: Find VSIX
        id: find_vsix
        run: |
          VSIX=$(ls *.vsix | head -n1)
          echo "vsix=$VSIX" >> $GITHUB_OUTPUT

      - name: Extract Release Notes
        id: extract_changelog
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          sed -n "/## \[$VERSION\]/,/## /p" CHANGELOG.md | sed '1d;$d' > release_notes.md
          {
            echo "notes<<EOF"
            cat release_notes.md
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.find_vsix.outputs.vsix }}
          body: ${{ steps.extract_changelog.outputs.notes }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to Visual Studio Marketplace (vsce)
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          npm i -g vsce
          vsce publish -p "$VSCE_PAT"

      # - name: Publish to Open VSX
      #   env:
      #     OPENVSX_TOKEN: ${{ secrets.OPENVSX_TOKEN }}
      #   run: |
      #     npm i -g @open-vsx/ovsx
      #     VSIX=$(ls *.vsix | head -n1)
      #     ovsx publish "$VSIX" --token "$OPENVSX_TOKEN"
